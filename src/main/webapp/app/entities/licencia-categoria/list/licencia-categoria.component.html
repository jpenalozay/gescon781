<div>
  <h2 id="page-heading" data-cy="LicenciaCategoriaHeading">
    <span jhiTranslate="gesconApp.licenciaCategoria.home.title">Licencia Categorias</span>

    <div class="d-flex justify-content-end">
      <button class="btn btn-info me-2" (click)="loadAll()" [disabled]="isLoading">
        <fa-icon icon="sync" [spin]="isLoading"></fa-icon>
        <span jhiTranslate="gesconApp.licenciaCategoria.home.refreshListLabel">Refresh List</span>
      </button>

      <button
        id="jh-create-entity"
        data-cy="entityCreateButton"
        class="btn btn-primary jh-create-entity create-licencia-categoria"
        [routerLink]="['/licencia-categoria/new']"
      >
        <fa-icon icon="plus"></fa-icon>
        <span jhiTranslate="gesconApp.licenciaCategoria.home.createLabel"> Create a new Licencia Categoria </span>
      </button>
    </div>
  </h2>

  <jhi-alert-error></jhi-alert-error>

  <jhi-alert></jhi-alert>

  <div class="alert alert-warning" id="no-result" *ngIf="licenciaCategorias?.length === 0">
    <span jhiTranslate="gesconApp.licenciaCategoria.home.notFound">No licenciaCategorias found</span>
  </div>

  <div class="table-responsive" id="entities" *ngIf="licenciaCategorias && licenciaCategorias.length > 0">
    <table class="table table-striped" aria-describedby="page-heading">
      <thead>
        <tr>
          <th scope="col"><span jhiTranslate="global.field.id">ID</span></th>
          <th scope="col"><span jhiTranslate="gesconApp.licenciaCategoria.categoria">Categoria</span></th>
          <th scope="col"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let licenciaCategoria of licenciaCategorias; trackBy: trackId" data-cy="entityTable">
          <td>
            <a [routerLink]="['/licencia-categoria', licenciaCategoria.id, 'view']">{{ licenciaCategoria.id }}</a>
          </td>
          <td>{{ licenciaCategoria.categoria }}</td>
          <td class="text-end">
            <div class="btn-group">
              <button
                type="submit"
                [routerLink]="['/licencia-categoria', licenciaCategoria.id, 'view']"
                class="btn btn-info btn-sm"
                data-cy="entityDetailsButton"
              >
                <fa-icon icon="eye"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.view">View</span>
              </button>

              <button
                type="submit"
                [routerLink]="['/licencia-categoria', licenciaCategoria.id, 'edit']"
                class="btn btn-primary btn-sm"
                data-cy="entityEditButton"
              >
                <fa-icon icon="pencil-alt"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.edit">Edit</span>
              </button>

              <button type="submit" (click)="delete(licenciaCategoria)" class="btn btn-danger btn-sm" data-cy="entityDeleteButton">
                <fa-icon icon="times"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.delete">Delete</span>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
