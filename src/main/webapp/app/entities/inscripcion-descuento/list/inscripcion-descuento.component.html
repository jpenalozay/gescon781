<div>
  <h2 id="page-heading" data-cy="InscripcionDescuentoHeading">
    <span jhiTranslate="gesconApp.inscripcionDescuento.home.title">Inscripcion Descuentos</span>

    <div class="d-flex justify-content-end">
      <button class="btn btn-info me-2" (click)="loadAll()" [disabled]="isLoading">
        <fa-icon icon="sync" [spin]="isLoading"></fa-icon>
        <span jhiTranslate="gesconApp.inscripcionDescuento.home.refreshListLabel">Refresh List</span>
      </button>

      <button
        id="jh-create-entity"
        data-cy="entityCreateButton"
        class="btn btn-primary jh-create-entity create-inscripcion-descuento"
        [routerLink]="['/inscripcion-descuento/new']"
      >
        <fa-icon icon="plus"></fa-icon>
        <span jhiTranslate="gesconApp.inscripcionDescuento.home.createLabel"> Create a new Inscripcion Descuento </span>
      </button>
    </div>
  </h2>

  <jhi-alert-error></jhi-alert-error>

  <jhi-alert></jhi-alert>

  <div class="alert alert-warning" id="no-result" *ngIf="inscripcionDescuentos?.length === 0">
    <span jhiTranslate="gesconApp.inscripcionDescuento.home.notFound">No inscripcionDescuentos found</span>
  </div>

  <div class="table-responsive" id="entities" *ngIf="inscripcionDescuentos && inscripcionDescuentos.length > 0">
    <table class="table table-striped" aria-describedby="page-heading">
      <thead>
        <tr>
          <th scope="col"><span jhiTranslate="global.field.id">ID</span></th>
          <th scope="col"><span jhiTranslate="gesconApp.inscripcionDescuento.descripcion">Descripcion</span></th>
          <th scope="col"><span jhiTranslate="gesconApp.inscripcionDescuento.monto">Monto</span></th>
          <th scope="col"><span jhiTranslate="gesconApp.inscripcionDescuento.inscripcion">Inscripcion</span></th>
          <th scope="col"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let inscripcionDescuento of inscripcionDescuentos; trackBy: trackId" data-cy="entityTable">
          <td>
            <a [routerLink]="['/inscripcion-descuento', inscripcionDescuento.id, 'view']">{{ inscripcionDescuento.id }}</a>
          </td>
          <td>{{ inscripcionDescuento.descripcion }}</td>
          <td>{{ inscripcionDescuento.monto }}</td>
          <td>
            <div *ngIf="inscripcionDescuento.inscripcion">
              <a [routerLink]="['/inscripcion', inscripcionDescuento.inscripcion?.id, 'view']">{{
                inscripcionDescuento.inscripcion?.codigo
              }}</a>
            </div>
          </td>
          <td class="text-end">
            <div class="btn-group">
              <button
                type="submit"
                [routerLink]="['/inscripcion-descuento', inscripcionDescuento.id, 'view']"
                class="btn btn-info btn-sm"
                data-cy="entityDetailsButton"
              >
                <fa-icon icon="eye"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.view">View</span>
              </button>

              <button
                type="submit"
                [routerLink]="['/inscripcion-descuento', inscripcionDescuento.id, 'edit']"
                class="btn btn-primary btn-sm"
                data-cy="entityEditButton"
              >
                <fa-icon icon="pencil-alt"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.edit">Edit</span>
              </button>

              <button type="submit" (click)="delete(inscripcionDescuento)" class="btn btn-danger btn-sm" data-cy="entityDeleteButton">
                <fa-icon icon="times"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.delete">Delete</span>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
