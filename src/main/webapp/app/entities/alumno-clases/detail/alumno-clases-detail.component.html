<div class="d-flex justify-content-center">
  <div class="col-8">
    <div *ngIf="alumnoClases">
      <h2 data-cy="alumnoClasesDetailsHeading"><span jhiTranslate="gesconApp.alumnoClases.detail.title">Alumno Clases</span></h2>

      <hr />

      <jhi-alert-error></jhi-alert-error>

      <jhi-alert></jhi-alert>

      <dl class="row-md jh-entity-details">
        <dt><span jhiTranslate="global.field.id">ID</span></dt>
        <dd>
          <span>{{ alumnoClases.id }}</span>
        </dd>
        <dt><span jhiTranslate="gesconApp.alumnoClases.clasesTotales">Clases Totales</span></dt>
        <dd>
          <span>{{ alumnoClases.clasesTotales }}</span>
        </dd>
        <dt><span jhiTranslate="gesconApp.alumnoClases.clasesProgramadas">Clases Programadas</span></dt>
        <dd>
          <span>{{ alumnoClases.clasesProgramadas }}</span>
        </dd>
        <dt><span jhiTranslate="gesconApp.alumnoClases.clasesRealizadas">Clases Realizadas</span></dt>
        <dd>
          <span>{{ alumnoClases.clasesRealizadas }}</span>
        </dd>
      </dl>

      <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
        <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span jhiTranslate="entity.action.back">Back</span>
      </button>

      <button type="button" [routerLink]="['/alumno-clases', alumnoClases.id, 'edit']" class="btn btn-primary">
        <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span jhiTranslate="entity.action.edit">Edit</span>
      </button>
    </div>
  </div>
</div>
