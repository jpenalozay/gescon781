<div>
  <h2 id="page-heading" data-cy="HorarioCatalogoHeading">
    <span jhiTranslate="gesconApp.horarioCatalogo.home.title">Horario Catalogos</span>

    <div class="d-flex justify-content-end">
      <button class="btn btn-info me-2" (click)="loadAll()" [disabled]="isLoading">
        <fa-icon icon="sync" [spin]="isLoading"></fa-icon>
        <span jhiTranslate="gesconApp.horarioCatalogo.home.refreshListLabel">Refresh List</span>
      </button>

      <button
        id="jh-create-entity"
        data-cy="entityCreateButton"
        class="btn btn-primary jh-create-entity create-horario-catalogo"
        [routerLink]="['/horario-catalogo/new']"
      >
        <fa-icon icon="plus"></fa-icon>
        <span jhiTranslate="gesconApp.horarioCatalogo.home.createLabel"> Create a new Horario Catalogo </span>
      </button>
    </div>
  </h2>

  <jhi-alert-error></jhi-alert-error>

  <jhi-alert></jhi-alert>

  <div class="alert alert-warning" id="no-result" *ngIf="horarioCatalogos?.length === 0">
    <span jhiTranslate="gesconApp.horarioCatalogo.home.notFound">No horarioCatalogos found</span>
  </div>

  <div class="table-responsive" id="entities" *ngIf="horarioCatalogos && horarioCatalogos.length > 0">
    <table class="table table-striped" aria-describedby="page-heading">
      <thead>
        <tr>
          <th scope="col"><span jhiTranslate="global.field.id">ID</span></th>
          <th scope="col"><span jhiTranslate="gesconApp.horarioCatalogo.activo">Activo</span></th>
          <th scope="col"><span jhiTranslate="gesconApp.horarioCatalogo.codigo">Codigo</span></th>
          <th scope="col"><span jhiTranslate="gesconApp.horarioCatalogo.horaInicio">Hora Inicio</span></th>
          <th scope="col"><span jhiTranslate="gesconApp.horarioCatalogo.horaFin">Hora Fin</span></th>
          <th scope="col"><span jhiTranslate="gesconApp.horarioCatalogo.descripcion">Descripcion</span></th>
          <th scope="col"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let horarioCatalogo of horarioCatalogos; trackBy: trackId" data-cy="entityTable">
          <td>
            <a [routerLink]="['/horario-catalogo', horarioCatalogo.id, 'view']">{{ horarioCatalogo.id }}</a>
          </td>
          <td jhiTranslate="{{ 'gesconApp.Estado.' + horarioCatalogo.activo }}">{{ horarioCatalogo.activo }}</td>
          <td>{{ horarioCatalogo.codigo }}</td>
          <td>{{ horarioCatalogo.horaInicio }}</td>
          <td>{{ horarioCatalogo.horaFin }}</td>
          <td>{{ horarioCatalogo.descripcion }}</td>
          <td class="text-end">
            <div class="btn-group">
              <button
                type="submit"
                [routerLink]="['/horario-catalogo', horarioCatalogo.id, 'view']"
                class="btn btn-info btn-sm"
                data-cy="entityDetailsButton"
              >
                <fa-icon icon="eye"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.view">View</span>
              </button>

              <button
                type="submit"
                [routerLink]="['/horario-catalogo', horarioCatalogo.id, 'edit']"
                class="btn btn-primary btn-sm"
                data-cy="entityEditButton"
              >
                <fa-icon icon="pencil-alt"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.edit">Edit</span>
              </button>

              <button type="submit" (click)="delete(horarioCatalogo)" class="btn btn-danger btn-sm" data-cy="entityDeleteButton">
                <fa-icon icon="times"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.delete">Delete</span>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
