<div class="d-flex justify-content-center">
  <div class="col-8">
    <div *ngIf="horarioCatalogo">
      <h2 data-cy="horarioCatalogoDetailsHeading"><span jhiTranslate="gesconApp.horarioCatalogo.detail.title">Horario Catalogo</span></h2>

      <hr />

      <jhi-alert-error></jhi-alert-error>

      <jhi-alert></jhi-alert>

      <dl class="row-md jh-entity-details">
        <dt><span jhiTranslate="global.field.id">ID</span></dt>
        <dd>
          <span>{{ horarioCatalogo.id }}</span>
        </dd>
        <dt><span jhiTranslate="gesconApp.horarioCatalogo.activo">Activo</span></dt>
        <dd>
          <span jhiTranslate="{{ 'gesconApp.Estado.' + horarioCatalogo.activo }}">{{ horarioCatalogo.activo }}</span>
        </dd>
        <dt><span jhiTranslate="gesconApp.horarioCatalogo.codigo">Codigo</span></dt>
        <dd>
          <span>{{ horarioCatalogo.codigo }}</span>
        </dd>
        <dt><span jhiTranslate="gesconApp.horarioCatalogo.horaInicio">Hora Inicio</span></dt>
        <dd>
          <span>{{ horarioCatalogo.horaInicio }}</span>
        </dd>
        <dt><span jhiTranslate="gesconApp.horarioCatalogo.horaFin">Hora Fin</span></dt>
        <dd>
          <span>{{ horarioCatalogo.horaFin }}</span>
        </dd>
        <dt><span jhiTranslate="gesconApp.horarioCatalogo.descripcion">Descripcion</span></dt>
        <dd>
          <span>{{ horarioCatalogo.descripcion }}</span>
        </dd>
      </dl>

      <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
        <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span jhiTranslate="entity.action.back">Back</span>
      </button>

      <button type="button" [routerLink]="['/horario-catalogo', horarioCatalogo.id, 'edit']" class="btn btn-primary">
        <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span jhiTranslate="entity.action.edit">Edit</span>
      </button>
    </div>
  </div>
</div>
